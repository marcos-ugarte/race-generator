name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt (fail on diff)
        run: |
          fmtout="$(gofmt -l .)"
          if [ -n "$fmtout" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$fmtout"
            exit 1
          fi

      # Includes the golden vectors (rng/seed_golden_test.go,
      # generators/golden_test.go) — the determinism / GLI replay guarantee.
      - name: Test
        run: go test ./...

      # Lab flavor: deterministic LabEntropy + makeSource seed contract.
      - name: Test (gli_lab)
        run: go test -tags gli_lab ./...

      # GLI-19 evidence-of-absence gate: production binaries must contain
      # neither the MT19937 test scaffolding nor the gli_lab entropy expander.
      # POSITIVE CONTROL first: the gli_lab build MUST contain LabEntropy —
      # this proves the symbol grep still matches reality (a rename of the
      # lab types would otherwise make the absence check vacuously green).
      - name: Verify prod binaries exclude lab RNG paths
        run: |
          go build -trimpath -tags gli_lab -o /tmp/racegen-lab ./cmd/race-generator
          if ! go tool nm /tmp/racegen-lab | grep -qi 'LabEntropy'; then
            echo "::error::positive control failed: gli_lab binary lacks LabEntropy symbols — the absence gate below is no longer testing anything"
            exit 1
          fi
          for cmd in race-generator rngextract; do
            go build -trimpath -o /tmp/$cmd-prod ./cmd/$cmd
            if go tool nm /tmp/$cmd-prod | grep -qi 'mt19937\|LabEntropy'; then
              echo "::error::$cmd production binary contains lab/test RNG symbols"
              go tool nm /tmp/$cmd-prod | grep -i 'mt19937\|LabEntropy'
              exit 1
            fi
          done

  lint:
    runs-on: ubuntu-latest
    # Optional gate: report but don't block the build-test job.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
