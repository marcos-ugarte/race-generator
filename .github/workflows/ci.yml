name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt (fail on diff)
        run: |
          fmtout="$(gofmt -l .)"
          if [ -n "$fmtout" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$fmtout"
            exit 1
          fi

      # Includes the golden vectors (rng/seed_golden_test.go,
      # generators/golden_test.go) — the determinism / GLI replay guarantee.
      - name: Test
        run: go test ./...

      # Lab flavor: deterministic LabEntropy + makeSource seed contract.
      - name: Test (gli_lab)
        run: go test -tags gli_lab ./...

      # GLI-19 evidence-of-absence gate: the production binary must contain
      # neither the MT19937 test scaffolding nor the gli_lab entropy expander.
      - name: Verify prod binary excludes lab RNG paths
        run: |
          go build -trimpath -o /tmp/racegen-prod ./cmd/race-generator
          if go tool nm /tmp/racegen-prod | grep -qi 'mt19937\|LabEntropy'; then
            echo "::error::production binary contains lab/test RNG symbols"
            go tool nm /tmp/racegen-prod | grep -i 'mt19937\|LabEntropy'
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    # Optional gate: report but don't block the build-test job.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
